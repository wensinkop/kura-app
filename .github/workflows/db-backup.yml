name: Nightly DB backup

# Free safety net for the production Supabase DB (~6,500 real transactions).
# Runs pg_dump nightly and stores the dump as a downloadable artifact (90-day
# retention). Restore with: pg_restore -d "<conn>" kura-backup-<stamp>.dump
#
# Connection is passed via standard libpq PG* env vars (no URL = no
# url-encoding pitfalls). Host/user/db are NOT secret and live here; only the
# DB password is a repo secret:
#   SUPABASE_DB_PASSWORD  = your Supabase database password (raw, as typed)
#   Add it in repo Settings -> Secrets and variables -> Actions -> New repository secret.
#
# Host/user come from the Supabase "Session pooler" (IPv4-friendly; the
# transaction pooler on port 6543 does NOT support pg_dump). The pooler username
# must include the project ref: postgres.<project-ref>.

on:
  schedule:
    - cron: '0 18 * * *'   # 18:00 UTC daily (~01:00 WIB)
  workflow_dispatch: {}     # lets you run it on demand from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 17
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database (public schema)
        env:
          PGHOST: aws-1-ap-southeast-1.pooler.supabase.com
          PGPORT: "5432"
          PGUSER: postgres.sxknuilzilwmkwltporg
          PGDATABASE: postgres
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set. Add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          ts=$(date -u +%Y%m%d-%H%M)
          echo "STAMP=$ts" >> "$GITHUB_ENV"
          pg_dump --schema=public --no-owner --no-privileges \
            -Fc -f "kura-backup-$ts.dump"
          ls -lh kura-backup-*.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: kura-db-backup-${{ env.STAMP }}
          path: kura-backup-*.dump
          retention-days: 90
